        * {

            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
        }

        header {
            background: #f4f4f4;
            text-align: center;
            padding: 15px;
        }

        nav ul {
            list-style: none;
            background: #eee;
            padding: 10px;
            text-align: center;
        }

        nav li {
            display: inline;
        }

        nav a {
            text-decoration: none;
            color: green;
            margin: 10px;
        }

        main {
            padding: 20px;
        }

        dt {
            color: red;
            font-weight: bold;
        }

        dd {

        }

        footer {

<body>

            <li><a href="index.html">Home</a></li>
            <li><a href="menu.html">Menu</a></li>
        </ul>
    </nav>
